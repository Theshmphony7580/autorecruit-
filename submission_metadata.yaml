methodology_summary: "We used a two-stage pipeline. Stage 1: Pre-computed dense embeddings using SentenceTransformers for semantic JD overlap. Stage 2: A memory-safe 16GB streaming JSON parser that applied 4 custom scorers (JD Fit, Skill Bundles, Career Context, Recency) combined into a weighted composite score. We used a Top-K Min-Heap to track the top 100 in memory to strictly stay under compute limits."
