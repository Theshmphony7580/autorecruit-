methodology_summary: "We used a highly-optimized, memory-safe streaming pipeline. Stage 1: Pre-computed dense embeddings (BAAI/bge-small-en-v1.5) for semantic JD overlap, capturing 'hidden talent' without relying on keyword stuffing. Stage 2: Applied strict JD disqualifiers (Consulting-only, Job Hoppers, Location limits) and forensic Honeypot bans. Stage 3: A streaming JSON parser applied 5 custom scorers (JD Fit, Skill Bundles, and live Redrob Signals [Demand, Behavior, Trust] parsed natively from the JSON schema) combined into a weighted composite score. We used an O(N log K) Min-Heap to track the top 100 in memory, executing in under 30 seconds."
