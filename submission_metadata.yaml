# ============================================================================
# Approach summary 
# ============================================================================
methodology_summary: |
  Two-stage CPU-only ranking engine designed for high performance and zero hallucination.
  Phase 1 (Offline Pre-Computation): Embeds candidate profiles and Job Description summaries 
  into 384-dimensional vectors using BAAI/bge-small-en-v1.5. Cosine similarity is computed and 
  saved offline (one-time execution, ~120 mins).

  Phase 2 (Online Ranking, <60s): Streams 100K candidates line-by-line using a memory-safe generator. 
  Applies 7 strict hard filters (YoE, title restrictions, domain-specific NLP/IR validation, 
  consulting-only penalty, relocation/location match, job-hopper filtering).

  Scoring: Candidates are scored on 6 weighted dimensions: JD Fit (30%), Market Demand (20%), 
  Search seriousness (20%), co-occurring Skill Bundles (15%), Trust/Credibility (10%), and Experience decay (5%).
  Out-of-spec/impostor profiles receive skill-stuffer penalties. Tracks the top 100 via an O(N log 100) Min-Heap.
  Reasoning: Generates deterministic, fact-grounded, non-templated reasoning strings with 
  cohort deduplication to prevent repetitive descriptions.

