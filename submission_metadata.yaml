# ---------------------------------------------------------------------------
# Section 10.2 — Methodology Summary (≤200 words)
# ---------------------------------------------------------------------------
methodology_summary: >
  Two-phase CPU-only ranking engine. Phase 1 (offline, one-time): all 100K
  candidates and the JD are encoded into 384-dim L2-normalized embeddings using
  BAAI/bge-small-en-v1.5. Candidate text is a rich pipe-delimited string covering
  title, YoE, industry, headline, summary, top-20 skills sorted by
  duration+endorsements, education, certifications, and the 3 most recent career
  role descriptions. Cosine similarity (dot product on normalized vectors) is
  stored as a pre-computed CSV. Phase 2 (ranking, <60 s wall-clock): Candidates
  are streamed line-by-line from JSONL. Seven hard filters eliminate honeypots,
  juniors (<3 yrs), non-engineering titles, wrong AI domain (CV/speech without
  NLP/IR), consulting-only careers, job hoppers (avg tenure <18 months), and
  out-of-location non-relocators. A two-pass JD skill gate preserves hidden
  talent (candidates who built retrieval systems without tagging "RAG"). Passing
  candidates receive a 6-factor composite score: JD Fit 30%, Market Demand 20%,
  Behavior/Engagement 20%, Bundle Quality 15%, Trust/Credibility 10%, Experience
  5%. An O(N log K) min-heap tracks the top 100. Reasoning is generated from
  real profile fields only — no hallucination possible.

# ---------------------------------------------------------------------------
# Section 3 — Compute Constraints Compliance
# ---------------------------------------------------------------------------
compute_constraints:
  total_ranking_runtime: "< 60 seconds wall-clock (well within 5-minute limit)"
  pre_computation_runtime: "~5-10 minutes (one-time offline step, not counted in ranking budget)"
  memory_peak_during_ranking: "< 2 GB RAM (pre-computed .npy loaded + 100-entry min-heap)"
  compute_type: "CPU only — no GPU used at any stage"
  network_during_ranking: "Offline — no external API calls during ranking step"
  intermediate_disk_usage: "~800 MB (candidate_embeddings.npy for 100K candidates)"
  gpu_used: false
  external_api_calls_during_ranking: false

# ---------------------------------------------------------------------------
# Section 10.3 — Reproducibility
# Single command that produces the submission CSV from the candidates file.
# ---------------------------------------------------------------------------
reproduction:
  # Step 1 — Pre-computation (one-time, offline; may exceed 5-min window)
  precompute_command: "python -m precompute.embeddings"
  precompute_working_directory: "Raking_engine/"

  # Step 2 — Ranking step (must complete in <5 min; this is what the sandbox validates)
  ranking_command: "python rank.py --candidates assets/candidates.jsonl --output submission.csv"
  ranking_working_directory: "Raking_engine/"

  # Alternate using configured defaults (dataset placed at assets/candidates.jsonl)
  ranking_command_defaults_only: "python rank.py"

  python_version: "3.10+"
  dependencies_file: "Raking_engine/requirements.txt"
  install_command: "pip install -r requirements.txt"

# ---------------------------------------------------------------------------
# Section 2 — Output File Specification Compliance
# ---------------------------------------------------------------------------
output_compliance:
  filename_format: "team_xxx.csv (per participant ID from portal)"
  encoding: "UTF-8"
  columns_in_order: ["candidate_id", "rank", "score", "reasoning"]
  row_count: 100
  rank_range: "1 to 100, each integer used exactly once"
  score_property: "monotonically non-increasing from rank 1 to rank 100"
  tie_breaking: "deterministic via candidate_id lexicographic comparison (Python tuple sort)"
  reasoning_included: true
  reasoning_style: >
    Cluster-aware, data-grounded assessment. Each string is assembled from real
    profile fields only (title, company, YoE, matched JD skills, career description
    excerpts, redrob_signals). Four structural layouts rotate across the cohort to
    prevent templating. Tight score clusters trigger a differentiator sentence
    citing the specific signal (saves, notice period, semantic coverage) that broke
    the tie. No inference model is used — zero hallucination by design.

# ---------------------------------------------------------------------------
# Section 7 — Honeypot Handling
# ---------------------------------------------------------------------------
honeypot_handling:
  strategy: >
    Honeypots are caught at Stage 1 (HardFilter) via precomputed forensic labels:
    a candidate is rejected if honey_pot_labels is 'suspicious' or 'high_risk',
    or if honeypot_score >= 3, or if date_anomaly == True. Additionally, impossible
    profiles (e.g. 'expert' skill with 0 months experience) naturally score low
    on Bundle Quality and Trust because neither co-occurring skill clusters nor
    verified engagement signals are present — the scoring dimensions are designed
    to be robust to profile inflation without special-casing honeypots.
  target_honeypot_rate_in_top_100: "0% (0/100 in current submission)"
  precomputed_forensic_file: "Raking_engine/assets/candidate_behavior_scores_full.csv"

# ---------------------------------------------------------------------------
# Section 4 — Scoring Architecture Summary
# ---------------------------------------------------------------------------
scoring_architecture:
  embedding_model: "BAAI/bge-small-en-v1.5"
  embedding_dimensions: 384
  embedding_normalization: "L2-normalized (cosine similarity via dot product)"

  hard_filter_stages:
    - "Honeypot ban (forensic label + honeypot_score >= 3 + date_anomaly)"
    - "Junior floor: years_of_experience < 3.0"
    - "Non-engineering title (marketing, HR, sales, recruiter, accountant, designer)"
    - "Wrong AI domain (CV/speech/robotics without NLP/IR evidence in summary)"
    - "Consulting-only career (100% of career_history at TCS/Infosys/Wipro/Accenture/Cognizant/Capgemini)"
    - "Job hopper (avg tenure < 18 months across 3+ roles)"
    - "Out-of-location non-relocator (India candidates outside Pune/Noida/Delhi NCR/Mumbai/Hyderabad and willing_to_relocate=False)"
    - "JD skill gate — two-pass: skills[] match OR full-text ML career term search"

  composite_score_weights:
    jd_fit: 0.30
    demand: 0.20
    behavior: 0.20
    bundle_quality: 0.15
    trust: 0.10
    experience: 0.05

  stuffer_penalty_applied: true
  stuffer_penalty_description: >
    Non-ML titled candidates with ML skills in their skills[] but zero ML terms
    in career descriptions receive a 0.7 penalty multiplied by 0.15 weight.
    Penalty scales down (0.3, 0.1) as ML career-text evidence increases,
    preserving genuine career transitioners.

  top_k_algorithm: "O(N log K) min-heap, K=100"
  reasoning_generation: >
    Deterministic extractive NLP from real profile fields. Four rotating structural
    layouts, cluster-aware differentiator sentences, global project deduplication
    across the 100-candidate cohort. 300-character soft cap.
