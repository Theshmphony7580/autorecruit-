# ---------------------------------------------------------------------------
# 10.2 Methodology Summary (≤200 words — used at Stage 4 manual review)
# ---------------------------------------------------------------------------
methodology_summary: >
  We built a two-phase CPU-only ranking engine. Phase 1 (offline pre-computation):
  We encode all 100K candidates and the full JD into 384-dimensional L2-normalized
  embeddings using BAAI/bge-small-en-v1.5. Candidate text is a rich pipe-delimited
  string covering title, YoE, industry, headline, summary, top-20 skills sorted by
  duration+endorsements, education, certifications, and the 3 most recent career role
  descriptions with company context. Cosine similarity (via dot product on normalized
  vectors) is stored as a pre-computed CSV. Phase 2 (ranking, <60 seconds):
  Candidates are streamed line-by-line from JSONL. Seven hard filters eliminate
  honeypots, juniors (<3 yrs), non-engineering titles, wrong AI domain (CV/speech
  without NLP/IR), consulting-only careers, job hoppers (avg tenure <18 months), and
  out-of-location non-relocators. A two-pass JD skill gate preserves hidden talent
  (candidates who built retrieval systems without tagging "RAG"). Passing candidates
  receive a 6-dimensional composite score: JD Fit (30%), Market Demand (20%),
  Behavior/Engagement (20%), Bundle Quality (15%), Trust/Credibility (10%),
  Experience (5%). An O(N log K) min-heap tracks the top 100 in memory. Data-grounded
  reasoning is generated from real profile fields only — no hallucination possible.

# ---------------------------------------------------------------------------
# Compute Constraints Compliance (Section 3 of spec)
# ---------------------------------------------------------------------------
compute_constraints:
  total_ranking_runtime: "< 60 seconds wall-clock (well within 5-minute limit)"
  pre_computation_runtime: "~5-10 minutes (one-time offline step, not counted in ranking)"
  memory_peak_during_ranking: "< 2 GB RAM (pre-computed .npy loaded + 100-entry min-heap)"
  compute_type: "CPU only — no GPU used at any stage"
  network_during_ranking: "Offline — no external API calls during ranking step"
  intermediate_disk_usage: "~800 MB (candidate_embeddings.npy for 100K candidates)"
  gpu_used: false
  external_api_calls_during_ranking: false

# ---------------------------------------------------------------------------
# Reproducibility — Single command to produce the submission CSV (Section 10.3)
# ---------------------------------------------------------------------------
reproduction:
  # Pre-computation (run once offline — may exceed 5-min window, documented in README)
  precompute_command: "python -m precompute.embeddings"
  precompute_working_directory: "Raking_engine/"

  # Ranking step — must complete within 5 minutes in the sandbox
  ranking_command: "python rank.py --candidates ../data_forensic\\ _files/candidates.jsonl --output submission.csv"
  ranking_working_directory: "Raking_engine/"

  # Alternate using defaults (if dataset is placed at the configured path)
  ranking_command_defaults_only: "python rank.py"

  python_version: "3.10+"
  dependencies_file: "Raking_engine/requirements.txt"
  install_command: "pip install -r requirements.txt"

# ---------------------------------------------------------------------------
# Output File Specification Compliance (Section 2 & 3 of spec)
# ---------------------------------------------------------------------------
output_compliance:
  filename_format: "team_xxx.csv"
  encoding: "UTF-8"
  columns_in_order: ["candidate_id", "rank", "score", "reasoning"]
  row_count: 100
  rank_range: "1 to 100, each integer used exactly once"
  score_property: "monotonically non-increasing from rank 1 to rank 100"
  tie_breaking: "deterministic via candidate_id lexicographic comparison (Python tuple sort)"
  reasoning_included: true
  reasoning_style: "data-grounded, pulls specific fields from candidate JSON — no hallucination"

# ---------------------------------------------------------------------------
# Honeypot Handling (Section 7 of spec)
# ---------------------------------------------------------------------------
honeypot_handling:
  strategy: >
    Honeypots are caught at Stage 1 (HardFilter) via precomputed forensic labels.
    A candidate is rejected if honey_pot_labels is 'suspicious' or 'high_risk',
    or if honeypot_score >= 3, or if date_anomaly == True. The system also
    naturally avoids honeypots because impossible profiles (e.g. 'expert' skill
    with 0 months experience) produce low Bundle and Trust scores even if they
    pass the label check — the scoring dimensions are designed to be robust to
    profile inflation.
  target_honeypot_rate_in_top_100: "< 10% (submission is disqualified above this)"
  precomputed_forensic_file: "Raking_engine/assets/candidate_behavior_scores_full.csv"

# ---------------------------------------------------------------------------
# Scoring Architecture Summary (for Stage 4 / 5 reference)
# ---------------------------------------------------------------------------
scoring_architecture:
  embedding_model: "BAAI/bge-small-en-v1.5"
  embedding_dimensions: 384
  embedding_normalization: "L2-normalized (cosine similarity via dot product)"
  hard_filter_stages:
    - "Honeypot ban (forensic label + score + date anomaly)"
    - "Junior floor: years_of_experience < 3.0"
    - "Non-engineering title (marketing, HR, sales, recruiter, accountant, designer)"
    - "Wrong AI domain (CV/speech/robotics without NLP/IR evidence in summary)"
    - "Consulting-only career (100% of career_history at TCS/Infosys/Wipro/etc.)"
    - "Job hopper (avg tenure < 18 months across 3+ jobs)"
    - "Out-of-location non-relocator (India candidates outside preferred cities and willing_to_relocate=False)"
    - "JD skill gate — two-pass: skills[] match OR full-text ML career term search"
  composite_score_weights:
    jd_fit: 0.30
    demand: 0.20
    behavior: 0.20
    bundle_quality: 0.15
    trust: 0.10
    experience: 0.05
  stuffer_penalty_applied: true
  top_k_algorithm: "O(N log K) min-heap, K=100"
  reasoning_generation: "data-grounded from actual profile fields, 300-char cap"
